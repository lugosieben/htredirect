name: Go Build

on: [pull_request, push]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.1'

      - name: Build
        run: |
          mkdir -p dist
          go build -v -o dist/htredirect ./cmd/htredirect

      - name: Upload binary to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: htredirect-${{ github.sha }}-${{ runner.os }}
          path: dist/htredirect
          if-no-files-found: error